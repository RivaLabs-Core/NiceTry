[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 200
via-ir = true
fs_permissions = [
    { access = "read", path = "./test/vectors" },
    { access = "read", path = "./verity/artifacts/fors-full-verifier-kernel" },
]

remappings = [
    "account-abstraction/=lib/account-abstraction/contracts/",
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]
